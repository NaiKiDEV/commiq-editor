name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      GYP_MSVS_VERSION: '2022'
    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Make
        run: pnpm make

      - uses: actions/upload-artifact@v4
        with:
          name: commiq-editor-windows
          path: packages/app/out/make/squirrel.windows/x64/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Make
        run: pnpm make

      - uses: actions/upload-artifact@v4
        with:
          name: commiq-editor-macos
          path: packages/app/out/make/zip/darwin/

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: commiq-editor-windows
          path: artifacts/windows

      - uses: actions/download-artifact@v4
        with:
          name: commiq-editor-macos
          path: artifacts/macos

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'nightly' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Nightly' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          make_latest: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || 'false' }}
          files: |
            artifacts/windows/*
            artifacts/macos/*
